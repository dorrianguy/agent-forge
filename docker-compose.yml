# Agent Forge - Docker Compose Configuration
# Run with: docker-compose up -d

version: '3.8'

services:
  # Main Agent Forge Application
  agent-forge:
    build: .
    container_name: agent-forge
    ports:
      - "8000:8000"
    environment:
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - DATABASE_URL=${DATABASE_URL:-sqlite:///./agent_forge.db}
      - REDIS_URL=${REDIS_URL:-redis://redis:6379}
      - SECRET_KEY=${SECRET_KEY:-change-me-in-production}
      - ENVIRONMENT=${ENVIRONMENT:-development}
    depends_on:
      - redis
    volumes:
      - ./data:/app/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Redis for caching and session management
  redis:
    image: redis:7-alpine
    container_name: agent-forge-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3

  # PostgreSQL database (optional - for production)
  # postgres:
  #   image: postgres:16-alpine
  #   container_name: agent-forge-db
  #   environment:
  #     - POSTGRES_USER=agentforge
  #     - POSTGRES_PASSWORD=${DB_PASSWORD:-agentforge}
  #     - POSTGRES_DB=agentforge
  #   ports:
  #     - "5432:5432"
  #   volumes:
  #     - postgres_data:/var/lib/postgresql/data
  #   restart: unless-stopped

volumes:
  redis_data:
  # postgres_data:

networks:
  default:
    name: agent-forge-network
