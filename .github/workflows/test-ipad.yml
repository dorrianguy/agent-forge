name: Test iPad Simulator

on:
  workflow_dispatch:

jobs:
  test-ipad:
    runs-on: macos-15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies and sync iOS
        run: |
          npm ci
          mkdir -p out
          echo '<!DOCTYPE html><html><head><title>Agent Forge</title></head><body><p>Loading...</p></body></html>' > out/index.html
          npx cap sync ios

      - name: Build for iPad Simulator
        working-directory: ios/App
        run: |
          xcodebuild build \
            -project App.xcodeproj \
            -scheme App \
            -sdk iphonesimulator \
            -destination 'generic/platform=iOS Simulator' \
            -derivedDataPath $PWD/build \
            CODE_SIGNING_ALLOWED=NO \
            ONLY_ACTIVE_ARCH=NO \
            2>&1 | tail -20

      - name: Find .app bundle
        id: find-app
        working-directory: ios/App
        run: |
          APP_PATH=$(find $PWD/build/Build/Products -name "App.app" -type d | head -1)
          echo "app_path=$APP_PATH" >> "$GITHUB_OUTPUT"
          echo "Found app at: $APP_PATH"

      - name: Boot iPad Simulator
        run: |
          DEVICE_ID=$(xcrun simctl list devices available -j | python3 -c "
          import json, sys
          data = json.load(sys.stdin)
          for runtime, devices in data['devices'].items():
              if 'iOS' not in runtime: continue
              for d in devices:
                  if 'iPad' in d['name'] and d['isAvailable']:
                      print(d['udid']); sys.exit(0)
          sys.exit(1)
          ")
          echo "Booting: $DEVICE_ID"
          xcrun simctl boot "$DEVICE_ID" || true
          sleep 10

      - name: Install app on simulator
        run: |
          xcrun simctl install booted "${{ steps.find-app.outputs.app_path }}"

      - name: Launch app
        run: |
          xcrun simctl launch booted com.agentforge.app
          echo "App launched"

      - name: Take screenshots and check for crashes
        run: |
          mkdir -p /tmp/screenshots

          sleep 3
          xcrun simctl io booted screenshot /tmp/screenshots/screenshot-3s.png
          echo "Took screenshot at 3s"

          sleep 5
          xcrun simctl io booted screenshot /tmp/screenshots/screenshot-8s.png
          echo "Took screenshot at 8s"

          sleep 7
          xcrun simctl io booted screenshot /tmp/screenshots/screenshot-15s.png
          echo "Took screenshot at 15s"

          echo "--- Crash Check ---"
          if xcrun simctl get_app_container booted com.agentforge.app 2>/dev/null; then
            echo "App is still running (no crash detected)"
          else
            echo "WARNING: App may have crashed"
            exit 1
          fi

      - name: Shutdown simulator
        if: always()
        run: xcrun simctl shutdown booted || true

      - name: Upload screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ipad-screenshots-agent-forge
          path: /tmp/screenshots/*.png
          retention-days: 14
