name: Submit to App Store Review

on:
  workflow_dispatch:

jobs:
  submit-review:
    runs-on: macos-26

    steps:
      - name: Submit app for review
        env:
          ASC_KEY_ID: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
          ASC_KEY_P8: ${{ secrets.APP_STORE_CONNECT_API_KEY_P8 }}
        run: |
          python3 -m venv /tmp/asc-venv
          source /tmp/asc-venv/bin/activate
          pip install PyJWT cryptography requests

          python3 << 'PYSCRIPT'
          import jwt, time, os, json, requests, sys

          key_id = os.environ["ASC_KEY_ID"]
          issuer_id = os.environ["ASC_ISSUER_ID"]
          key_b64 = os.environ["ASC_KEY_P8"]

          # Decode the p8 key
          import base64
          key_bytes = base64.b64decode(key_b64)
          private_key = key_bytes.decode("utf-8")

          # Generate JWT
          now = int(time.time())
          token = jwt.encode(
              {"iss": issuer_id, "iat": now, "exp": now + 1200, "aud": "appstoreconnect-v1"},
              private_key,
              algorithm="ES256",
              headers={"kid": key_id},
          )
          print("✅ JWT generated")

          headers = {"Authorization": f"Bearer {token}", "Content-Type": "application/json"}
          BASE = "https://api.appstoreconnect.apple.com/v1"

          # 1. Find the app
          r = requests.get(f"{BASE}/apps", params={"filter[bundleId]": "com.agentforge.app"}, headers=headers)
          print(f"App lookup: {r.status_code}")
          if r.status_code != 200:
              print(f"ERROR: {r.text}")
              sys.exit(1)
          apps = r.json()["data"]
          if not apps:
              print("ERROR: No app found with bundle ID com.agentforge.app")
              sys.exit(1)
          app_id = apps[0]["id"]
          print(f"✅ App ID: {app_id}")

          # 2. Find the latest build
          r = requests.get(f"{BASE}/builds", params={"filter[app]": app_id, "sort": "-uploadedDate", "limit": "1"}, headers=headers)
          print(f"Builds lookup: {r.status_code}")
          builds = r.json()["data"]
          if not builds:
              print("ERROR: No builds found")
              sys.exit(1)
          build = builds[0]
          build_id = build["id"]
          build_ver = build["attributes"]["version"]
          build_state = build["attributes"]["processingState"]
          print(f"✅ Latest build: version {build_ver}, state: {build_state}, id: {build_id}")

          # 3. Wait for build processing if needed
          if build_state != "VALID":
              print(f"Build is {build_state}, waiting for processing...")
              for attempt in range(30):
                  time.sleep(30)
                  r = requests.get(f"{BASE}/builds/{build_id}", headers=headers)
                  state = r.json()["data"]["attributes"]["processingState"]
                  print(f"  Attempt {attempt+1}: {state}")
                  if state == "VALID":
                      print("✅ Build is ready!")
                      break
                  if state in ("FAILED", "INVALID"):
                      print(f"❌ Build processing failed: {state}")
                      sys.exit(1)
              else:
                  print("❌ Timed out waiting for build processing")
                  sys.exit(1)

          # 3b. Set encryption declaration on the build
          print("Setting encryption declaration on build...")
          r = requests.put(
              f"{BASE}/builds/{build_id}/relationships/betaAppReviewSubmission",
              headers=headers,
              json={}
          )
          # Use the direct build update approach
          r = requests.patch(f"{BASE}/builds/{build_id}", headers=headers, json={
              "data": {
                  "type": "builds",
                  "id": build_id,
                  "attributes": {"usesNonExemptEncryption": False}
              }
          })
          print(f"Set encryption: {r.status_code}")
          if r.status_code >= 400:
              print(f"Encryption response: {r.text}")
              # Try alternative endpoint for encryption
              r2 = requests.post(f"{BASE}/buildBetaDetails", headers=headers, json={
                  "data": {
                      "type": "buildBetaDetails",
                      "relationships": {
                          "build": {"data": {"type": "builds", "id": build_id}}
                      }
                  }
              })
              print(f"Alt encryption endpoint: {r2.status_code}: {r2.text[:200]}")

          # 3c. Clean up any orphaned review submissions
          r = requests.get(f"{BASE}/reviewSubmissions", params={
              "filter[app]": app_id, "filter[platform]": "IOS"
          }, headers=headers)
          if r.status_code == 200:
              for sub in r.json().get("data", []):
                  sub_state = sub["attributes"]["state"]
                  sub_id = sub["id"]
                  if sub_state in ("READY_FOR_REVIEW", "WAITING_FOR_REVIEW", "IN_REVIEW"):
                      print(f"Found existing submission {sub_id} in state {sub_state}")
                  elif sub_state not in ("COMPLETE",):
                      print(f"Cleaning up orphaned submission {sub_id} (state: {sub_state})")
                      requests.delete(f"{BASE}/reviewSubmissions/{sub_id}", headers=headers)

          # 4. Find or create app store version
          r = requests.get(f"{BASE}/apps/{app_id}/appStoreVersions", params={"limit": "5"}, headers=headers)
          print(f"Versions lookup: {r.status_code}")
          versions = r.json()["data"]
          version_id = None
          for v in versions:
              state = v["attributes"]["appStoreState"]
              ver = v["attributes"]["versionString"]
              print(f"  Version {ver}: {state} (id: {v['id']})")
              if state in ("PREPARE_FOR_SUBMISSION", "DEVELOPER_REJECTED", "REJECTED"):
                  version_id = v["id"]
                  print(f"  → Using this version")
                  break

          if not version_id:
              print("No editable version found. Creating version 1.0...")
              r = requests.post(f"{BASE}/appStoreVersions", headers=headers, json={
                  "data": {
                      "type": "appStoreVersions",
                      "attributes": {"platform": "IOS", "versionString": "1.0"},
                      "relationships": {"app": {"data": {"type": "apps", "id": app_id}}}
                  }
              })
              if r.status_code not in (200, 201):
                  print(f"ERROR creating version: {r.text}")
                  sys.exit(1)
              version_id = r.json()["data"]["id"]
              print(f"✅ Created version: {version_id}")

          # 5. Attach build to version
          print(f"Attaching build {build_id} to version {version_id}...")
          r = requests.patch(
              f"{BASE}/appStoreVersions/{version_id}/relationships/build",
              headers=headers,
              json={"data": {"type": "builds", "id": build_id}}
          )
          print(f"Attach build: {r.status_code}")
          if r.status_code >= 400:
              print(f"Attach response: {r.text}")
              # Non-fatal — build might already be attached

          # 6. Submit for review using reviewSubmissions API (new multi-step flow)
          print("Submitting for App Store review...")

          # Step 6a: Create a review submission
          r = requests.post(f"{BASE}/reviewSubmissions", headers=headers, json={
              "data": {
                  "type": "reviewSubmissions",
                  "attributes": {"platform": "IOS"},
                  "relationships": {
                      "app": {
                          "data": {"type": "apps", "id": app_id}
                      }
                  }
              }
          })
          print(f"Create review submission: {r.status_code}")
          if r.status_code not in (200, 201):
              print(f"Response: {r.text}")
              # Check if there's already a pending submission
              if r.status_code == 409:
                  print("Conflict — checking for existing submission...")
                  r2 = requests.get(f"{BASE}/reviewSubmissions", params={
                      "filter[app]": app_id, "filter[platform]": "IOS",
                      "filter[state]": "READY_FOR_REVIEW,WAITING_FOR_REVIEW,IN_REVIEW"
                  }, headers=headers)
                  if r2.status_code == 200 and r2.json()["data"]:
                      sub = r2.json()["data"][0]
                      print(f"🎉 Already submitted! State: {sub['attributes']['state']}")
                      sys.exit(0)
              sys.exit(1)

          submission = r.json()["data"]
          submission_id = submission["id"]
          print(f"✅ Review submission created: {submission_id}")

          # Step 6b: Add the app store version as a review item
          r = requests.post(f"{BASE}/reviewSubmissionItems", headers=headers, json={
              "data": {
                  "type": "reviewSubmissionItems",
                  "relationships": {
                      "reviewSubmission": {
                          "data": {"type": "reviewSubmissions", "id": submission_id}
                      },
                      "appStoreVersion": {
                          "data": {"type": "appStoreVersions", "id": version_id}
                      }
                  }
              }
          })
          print(f"Add review item: {r.status_code}")
          if r.status_code not in (200, 201):
              print(f"Response: {r.text}")
              # Try to continue — the version might be auto-added

          # Step 6c: Confirm the submission (change state to SUBMITTED)
          r = requests.patch(f"{BASE}/reviewSubmissions/{submission_id}", headers=headers, json={
              "data": {
                  "type": "reviewSubmissions",
                  "id": submission_id,
                  "attributes": {"submitted": True}
              }
          })
          print(f"Confirm submission: {r.status_code}")
          if r.status_code in (200, 201):
              state = r.json()["data"]["attributes"]["state"]
              print(f"🎉 Successfully submitted for App Store review! State: {state}")
          else:
              print(f"Confirm response: {r.text}")
              try:
                  errors = r.json().get("errors", [])
                  for err in errors:
                      detail = err.get("detail", "")
                      code = err.get("code", "")
                      print(f"  Error [{code}]: {detail}")
              except:
                  pass
              sys.exit(1)

          PYSCRIPT
