name: Submit to App Store Review

on:
  workflow_dispatch:

jobs:
  submit-review:
    runs-on: macos-26

    steps:
      - name: Submit app for review
        env:
          ASC_KEY_ID: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
          ASC_KEY_P8: ${{ secrets.APP_STORE_CONNECT_API_KEY_P8 }}
        run: |
          python3 -m venv /tmp/asc-venv
          source /tmp/asc-venv/bin/activate
          pip install PyJWT cryptography requests

          python3 << 'PYSCRIPT'
          import jwt, time, os, json, requests, sys, base64

          key_id = os.environ["ASC_KEY_ID"]
          issuer_id = os.environ["ASC_ISSUER_ID"]
          private_key = base64.b64decode(os.environ["ASC_KEY_P8"]).decode("utf-8")

          now = int(time.time())
          token = jwt.encode(
              {"iss": issuer_id, "iat": now, "exp": now + 1200, "aud": "appstoreconnect-v1"},
              private_key, algorithm="ES256", headers={"kid": key_id},
          )
          print("✅ JWT generated")

          H = {"Authorization": f"Bearer {token}", "Content-Type": "application/json"}
          BASE = "https://api.appstoreconnect.apple.com/v1"
          APP_ID = "6760276686"  # Known from previous runs

          # 1. Get latest build
          r = requests.get(f"{BASE}/builds", params={"filter[app]": APP_ID, "sort": "-uploadedDate", "limit": "1"}, headers=H)
          build = r.json()["data"][0]
          build_id = build["id"]
          print(f"✅ Build: version {build['attributes']['version']}, state: {build['attributes']['processingState']}")

          # 2. Set encryption if not already set
          r = requests.patch(f"{BASE}/builds/{build_id}", headers=H, json={
              "data": {"type": "builds", "id": build_id, "attributes": {"usesNonExemptEncryption": False}}
          })
          print(f"Encryption: {r.status_code} ({'already set' if r.status_code == 409 else 'set'})")

          # 3. Check if already submitted
          r = requests.get(f"{BASE}/reviewSubmissions", params={
              "filter[app]": APP_ID, "filter[platform]": "IOS"
          }, headers=H)
          for sub in r.json().get("data", []):
              state = sub["attributes"]["state"]
              if state in ("WAITING_FOR_REVIEW", "IN_REVIEW"):
                  print(f"🎉 Already in review! State: {state}")
                  sys.exit(0)

          # 4. Create new version 1.0.1 (clean slate, avoids stuck submissions)
          print("\nCreating fresh version 1.0.1...")
          r = requests.post(f"{BASE}/appStoreVersions", headers=H, json={
              "data": {
                  "type": "appStoreVersions",
                  "attributes": {"platform": "IOS", "versionString": "1.0.1", "releaseType": "AFTER_APPROVAL"},
                  "relationships": {"app": {"data": {"type": "apps", "id": APP_ID}}}
              }
          })
          print(f"Create version: {r.status_code}")
          if r.status_code == 409:
              # Version might already exist — find it
              print("Version 1.0.1 may already exist, searching...")
              r2 = requests.get(f"{BASE}/apps/{APP_ID}/appStoreVersions", params={"limit": "5"}, headers=H)
              for v in r2.json()["data"]:
                  vs = v["attributes"]["versionString"]
                  st = v["attributes"]["appStoreState"]
                  print(f"  {vs}: {st}")
                  if st == "PREPARE_FOR_SUBMISSION":
                      version_id = v["id"]
                      print(f"  → Using version {vs} ({version_id})")
                      break
              else:
                  print("No PREPARE_FOR_SUBMISSION version found")
                  sys.exit(1)
          elif r.status_code in (200, 201):
              version_id = r.json()["data"]["id"]
              print(f"✅ Created version 1.0.1: {version_id}")
          else:
              print(f"Error: {r.text}")
              sys.exit(1)

          # 5. Attach build
          print(f"Attaching build {build_id}...")
          r = requests.patch(
              f"{BASE}/appStoreVersions/{version_id}/relationships/build",
              headers=H, json={"data": {"type": "builds", "id": build_id}}
          )
          print(f"Attach: {r.status_code}")

          # 6. Set localization metadata
          r = requests.get(f"{BASE}/appStoreVersions/{version_id}/appStoreVersionLocalizations", headers=H)
          locs = r.json()["data"]
          if not locs:
              print("Creating en-US localization...")
              r = requests.post(f"{BASE}/appStoreVersionLocalizations", headers=H, json={
                  "data": {
                      "type": "appStoreVersionLocalizations",
                      "attributes": {
                          "locale": "en-US",
                          "description": "Agent Forge is the ultimate AI agent builder. Create, customize, and deploy intelligent AI agents in minutes — no coding required.\n\nKey Features:\n• Visual Agent Builder - Design agent workflows with an intuitive drag-and-drop interface\n• Multiple AI Models - Choose from Claude, GPT-4, Gemini, and more\n• Knowledge Base - Upload documents to give your agents domain expertise\n• Voice Agents - Build agents that can speak and listen with natural voices\n• One-Click Deploy - Share your agents via link, embed widget, or API\n• Real-Time Analytics - Monitor conversations, usage, and performance\n• Templates - Start from pre-built agent templates for common use cases\n\nPerfect for:\n- Customer support automation\n- Sales assistants and lead qualification\n- Internal knowledge bots\n- Content creation helpers\n- Personal AI assistants\n\nGet started free and upgrade when you need more power.",
                          "keywords": "AI,agent,chatbot,GPT,Claude,builder,no-code,automation,assistant,voice",
                          "marketingUrl": "https://agent-forge.app",
                          "supportUrl": "https://agent-forge.app/support",
                          "whatsNew": "Initial release - Build, deploy and manage AI agents with an intuitive visual builder."
                      },
                      "relationships": {
                          "appStoreVersion": {"data": {"type": "appStoreVersions", "id": version_id}}
                      }
                  }
              })
              print(f"Create localization: {r.status_code}")
              if r.status_code >= 400:
                  print(r.text[:500])
          else:
              loc_id = locs[0]["id"]
              attrs = locs[0]["attributes"]
              updates = {}
              if not attrs.get("description"):
                  updates["description"] = "Agent Forge is the ultimate AI agent builder. Create, customize, and deploy intelligent AI agents in minutes — no coding required.\n\nKey Features:\n• Visual Agent Builder\n• Multiple AI Models (Claude, GPT-4, Gemini)\n• Knowledge Base Upload\n• Voice Agents\n• One-Click Deploy\n• Real-Time Analytics\n• Pre-built Templates"
              if not attrs.get("keywords"):
                  updates["keywords"] = "AI,agent,chatbot,GPT,Claude,builder,no-code,automation,assistant,voice"
              if not attrs.get("whatsNew"):
                  updates["whatsNew"] = "Initial release - Build, deploy and manage AI agents with an intuitive visual builder."
              if not attrs.get("supportUrl"):
                  updates["supportUrl"] = "https://agent-forge.app/support"
              if not attrs.get("marketingUrl"):
                  updates["marketingUrl"] = "https://agent-forge.app"
              if updates:
                  print(f"Updating localization: {list(updates.keys())}")
                  r = requests.patch(f"{BASE}/appStoreVersionLocalizations/{loc_id}", headers=H, json={
                      "data": {"type": "appStoreVersionLocalizations", "id": loc_id, "attributes": updates}
                  })
                  print(f"Update: {r.status_code}")
              else:
                  print("Localization already complete")

          # 7. Set privacy policy URL (on appInfoLocalizations)
          r = requests.get(f"{BASE}/apps/{APP_ID}/appInfos", headers=H)
          for info in r.json()["data"]:
              if info["attributes"].get("appStoreState") != "READY_FOR_DISTRIBUTION":
                  r2 = requests.get(f"{BASE}/appInfos/{info['id']}/appInfoLocalizations", headers=H)
                  for loc in r2.json()["data"]:
                      if not loc["attributes"].get("privacyPolicyUrl"):
                          print("Setting privacy policy URL...")
                          requests.patch(f"{BASE}/appInfoLocalizations/{loc['id']}", headers=H, json={
                              "data": {"type": "appInfoLocalizations", "id": loc["id"],
                                       "attributes": {"privacyPolicyUrl": "https://agent-forge.app/privacy"}}
                          })

          # 8. Set app review detail
          r = requests.get(f"{BASE}/appStoreVersions/{version_id}/appStoreReviewDetail", headers=H)
          if r.status_code == 404:
              print("Creating app review detail...")
              r = requests.post(f"{BASE}/appStoreReviewDetails", headers=H, json={
                  "data": {
                      "type": "appStoreReviewDetails",
                      "attributes": {
                          "contactFirstName": "Dorrian",
                          "contactLastName": "Guy",
                          "contactPhone": "+15550100",
                          "contactEmail": "dorrianguy@gmail.com",
                          "demoAccountRequired": True,
                          "demoAccountName": "review@agent-forge.app",
                          "demoAccountPassword": "AppReview2026x",
                          "notes": "Demo account has 3 pre-built AI agents. Tap My Agents tab to see agents, then tap any agent to start a chat."
                      },
                      "relationships": {
                          "appStoreVersion": {"data": {"type": "appStoreVersions", "id": version_id}}
                      }
                  }
              })
              print(f"Create review detail: {r.status_code}")
              if r.status_code >= 400:
                  print(r.text[:500])
          else:
              print("App review detail already exists")

          # 9. Copy screenshots from old version if this is a new version
          # Check if new version has screenshots
          r = requests.get(f"{BASE}/appStoreVersions/{version_id}/appStoreVersionLocalizations", headers=H)
          if r.status_code == 200 and r.json()["data"]:
              new_loc_id = r.json()["data"][0]["id"]
              sr = requests.get(f"{BASE}/appStoreVersionLocalizations/{new_loc_id}/appScreenshotSets", headers=H)
              new_ss_count = len(sr.json().get("data", []))
              print(f"New version has {new_ss_count} screenshot sets")

              if new_ss_count == 0:
                  print("⚠️ No screenshots on new version.")
                  print("Screenshots must be uploaded via App Store Connect UI.")
                  print("However, trying to submit anyway (Apple may carry forward from previous version)...")

          # 10. Create review submission and submit
          print("\nCreating review submission...")
          r = requests.post(f"{BASE}/reviewSubmissions", headers=H, json={
              "data": {
                  "type": "reviewSubmissions",
                  "attributes": {"platform": "IOS"},
                  "relationships": {"app": {"data": {"type": "apps", "id": APP_ID}}}
              }
          })
          print(f"Create submission: {r.status_code}")
          if r.status_code not in (200, 201):
              print(r.text[:500])
              sys.exit(1)
          sub_id = r.json()["data"]["id"]

          # Add version item
          r = requests.post(f"{BASE}/reviewSubmissionItems", headers=H, json={
              "data": {
                  "type": "reviewSubmissionItems",
                  "relationships": {
                      "reviewSubmission": {"data": {"type": "reviewSubmissions", "id": sub_id}},
                      "appStoreVersion": {"data": {"type": "appStoreVersions", "id": version_id}}
                  }
              }
          })
          print(f"Add item: {r.status_code}")
          if r.status_code not in (200, 201):
              print(r.text[:500])

          # Confirm
          print("Confirming submission...")
          for attempt in range(5):
              r = requests.patch(f"{BASE}/reviewSubmissions/{sub_id}", headers=H, json={
                  "data": {"type": "reviewSubmissions", "id": sub_id, "attributes": {"submitted": True}}
              })
              print(f"Attempt {attempt+1}: {r.status_code}")
              if r.status_code in (200, 201):
                  print(f"🎉 Successfully submitted for App Store review! State: {r.json()['data']['attributes']['state']}")
                  sys.exit(0)
              errors = r.json().get("errors", [])
              for err in errors:
                  print(f"  [{err.get('code')}] {err.get('detail')}")
                  for path, subs in err.get("meta", {}).get("associatedErrors", {}).items():
                      for se in subs:
                          print(f"    → [{se.get('code')}] {se.get('detail')}")
              if any("try again later" in e.get("detail", "").lower() for e in errors):
                  print("  Waiting 60s...")
                  time.sleep(60)
              else:
                  break

          print("❌ Submission failed. Check App Store Connect manually:")
          print(f"  https://appstoreconnect.apple.com/apps/{APP_ID}/appstore")
          sys.exit(1)

          PYSCRIPT
